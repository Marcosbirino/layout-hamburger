<body>

            <a class="menu">Produtos</a>
            <a class="menu">Inscreva-se</a>
            <button class="loguin">Loguin</button>
         </nav>

    </header>

    <main>
        <img src="./assets/dev-logo.png" alt="dev-logo"/>

        <section>
            <h1>Se torne um DEV ainda em 2026!</h1>

            <p>Entre para um mercado muito valorizado e disputado!<br> <br>
               No Brasil e fora dele, tenha as melhores oportunidades sem precisar sair do Pais.
            </p>

                <button class="saiba-mais">Saiba mais</button>
        </section>
    </main>
</body>

</html>
